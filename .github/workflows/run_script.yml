name: Run Similarity Script

on:
  schedule:
    # This cron syntax means "every 5 minutes"
    - cron: '*/5 * * * *'
  # This allows you to manually trigger the script from the Actions tab for testing
  workflow_dispatch:

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Change to your preferred Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Python script
        # Replace 'main.py' with the actual name of your script file
      run: python main.py 
