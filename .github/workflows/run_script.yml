name: Run Similarity Script

on:
  schedule:
    # Runs every 5 minutes in UTC.
    - cron: '*/5 * * * *'
  # Keeps the manual Run workflow button available for testing.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: material-search-scheduled-run
  cancel-in-progress: true

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Change to your preferred Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Python script
      run: python main.py

    - name: Upload result CSV
      uses: actions/upload-artifact@v4
      with:
        name: material-search-result
        path: result.csv
        if-no-files-found: error

    - name: Commit result CSV
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add result.csv
        if git diff --cached --quiet; then
          echo "No result.csv changes to commit"
        else
          git commit -m "Update material search result"
          git push
        fi
